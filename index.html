<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pixel Runner - Sürpriz Macera</title>
<style>
  body, html {
    margin: 0; padding: 0; overflow: hidden; background: #222; 
    font-family: monospace;
    transition: transform 1s ease;
  }
  #game {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(to top, #555 0%, #222 100%);
  }
  #player {
    position: absolute;
    bottom: 50px;
    left: 50px;
    width: 40px;
    height: 40px;
    background: limegreen;
    border-radius: 6px;
    transition: bottom 0.1s, opacity 0.5s;
    display: flex;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
  }
  .eye {
    width: 10px;
    height: 10px;
    background: white;
    border-radius: 50%;
    margin: 0 5px;
    position: relative;
    overflow: hidden;
  }
  .pupil {
    width: 5px;
    height: 5px;
    background: black;
    border-radius: 50%;
    position: absolute;
    left: 2px;
    top: 2px;
    transition: left 0.1s, top 0.1s;
  }
  #ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100vw;
    height: 50px;
    background: #444;
  }
  .obstacle {
    position: absolute;
    bottom: 50px;
    border-radius: 4px;
    animation-timing-function: linear;
  }
  #score {
    position: absolute;
    top: 20px;
    right: 20px;
    color: white;
    font-size: 24px;
    user-select: none;
  }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff0;
    font-size: 32px;
    display: none;
    user-select: none;
  }
  .door {
    position: absolute;
    bottom: 50px;
    border-radius: 6px;
    background: rebeccapurple;
    width: 30px;
    height: 120px;
    right: -40px;
  }
</style>
</head>
<body>
  <div id="game">
    <div id="player">
      <div class="eye"><div class="pupil" id="pupil-left"></div></div>
      <div class="eye"><div class="pupil" id="pupil-right"></div></div>
    </div>
    <div id="ground"></div>
    <div id="score">0</div>
    <div id="message"></div>
  </div>

<script>
  const player = document.getElementById('player');
  const pupilLeft = document.getElementById('pupil-left');
  const pupilRight = document.getElementById('pupil-right');
  const game = document.getElementById('game');
  const scoreDisplay = document.getElementById('score');
  const message = document.getElementById('message');

  let isJumping = false;
  let jumpHeight = 0;
  let jumpSpeed = 0;
  let gravity = 0.6;
  let playerBottom = 50;
  let gameSpeed = 6;
  let obstacles = [];
  let score = 0;
  let gameOver = false;
  let pupilSwingInterval = null;
  let doorPresent = false;
  let doorElement = null;
  let isInDoor = false;
  let isFlipped = false;

  const soundDoor = new Audio('https://actions.google.com/sounds/v1/doors/door_open_creak.ogg');
  const soundGameOver = new Audio('https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg');

  const obstacleTypes = [
    { width: 30, height: 40, color: 'crimson' },
    { width: 20, height: 60, color: 'darkorange' },
    { width: 40, height: 20, color: 'yellowgreen' },
    { width: 35, height: 50, color: 'mediumvioletred' },
    { width: 25, height: 30, color: 'deepskyblue' },
  ];

  function increaseSpeed() {
    if (score % 10 === 0 && score > 0) {
      gameSpeed += 0.5;
    }
  }

  function movePupils(direction) {
    let leftPos, rightPos;
    switch(direction) {
      case 'left': leftPos = '0px'; rightPos = '0px'; break;
      case 'right': leftPos = '4px'; rightPos = '4px'; break;
      default: leftPos = '2px'; rightPos = '2px';
    }
    pupilLeft.style.left = leftPos;
    pupilRight.style.left = rightPos;
  }

  function startPupilSwing() {
    let direction = 1;
    const maxOffset = 3;
    if (pupilSwingInterval) clearInterval(pupilSwingInterval);
    pupilSwingInterval = setInterval(() => {
      if (gameOver || !isJumping) {
        clearInterval(pupilSwingInterval);
        movePupils('center');
        return;
      }
      let offset = direction * maxOffset;
      pupilLeft.style.left = (2 + offset) + 'px';
      pupilRight.style.left = (2 + offset) + 'px';
      direction *= -1;
    }, 200);
  }

  function jump() {
    if (isJumping || gameOver) return;
    isJumping = true;
    jumpSpeed = 12;
    startPupilSwing();
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      if (!gameOver) jump();
      else resetGame();
    }
    if (e.code === 'ArrowLeft') movePupils('left');
    if (e.code === 'ArrowRight') movePupils('right');
  });

  document.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
      movePupils('center');
    }
  });

  function createObstacle() {
    if (gameOver) return;
    if (!doorPresent && Math.random() < 0.1) {
      doorElement = document.createElement('div');
      doorElement.classList.add('door');
      doorElement.style.right = '-40px';
      game.appendChild(doorElement);
      doorPresent = true;
      obstacles.push(doorElement);
      return;
    }

    const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
    const obstacle = document.createElement('div');
    obstacle.classList.add('obstacle');
    obstacle.style.width = type.width + 'px';
    obstacle.style.height = type.height + 'px';
    obstacle.style.backgroundColor = type.color;
    obstacle.style.bottom = '50px';
    obstacle.style.right = '-40px';
    obstacle.style.animationDuration = (4000 / gameSpeed) + 'ms';
    game.appendChild(obstacle);
    obstacles.push(obstacle);
  }

  setInterval(() => {
    createObstacle();
  }, 1200);

  function gameLoop() {
    if (gameOver) return;

    if (isJumping) {
      jumpHeight += jumpSpeed;
      jumpSpeed -= gravity;
      playerBottom = 50 + jumpHeight;
      if (playerBottom <= 50) {
        playerBottom = 50;
        isJumping = false;
        jumpHeight = 0;
        if (pupilSwingInterval) {
          clearInterval(pupilSwingInterval);
          pupilSwingInterval = null;
          movePupils('center');
        }
      }
      player.style.bottom = playerBottom + 'px';
    }

    obstacles.forEach((obstacle, index) => {
      let right = parseFloat(obstacle.style.right);
      right += gameSpeed;
      obstacle.style.right = right + 'px';
      obstacle.style.bottom = '50px';

      if (obstacle.classList.contains('door')) {
        if (isColliding(player, obstacle) && !isInDoor) {
          enterDoor();
        }
      } else {
        if (right > window.innerWidth + 50) {
          obstacle.remove();
          obstacles.splice(index, 1);
          score++;
          scoreDisplay.textContent = score;
          increaseSpeed();
        } else if (isColliding(player, obstacle)) {
          endGame();
        }
      }
    });

    requestAnimationFrame(gameLoop);
  }

  function isColliding(rect1, rect2) {
    const r1 = rect1.getBoundingClientRect();
    const r2 = rect2.getBoundingClientRect();
    return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
  }

  function enterDoor() {
    isInDoor = true;
    doorPresent = false;
    soundDoor.play();

    if (doorElement) {
      doorElement.remove();
      doorElement = null;
    }

    // Ekranı ters çevir/düzle
    isFlipped = !isFlipped;
    document.body.style.transform = isFlipped ? 'rotate(180deg)' : 'rotate(0deg)';

    setTimeout(() => {
      isInDoor = false;
    }, 1000); // kapıdan geçiş efekti süresi
  }

  function endGame() {
    gameOver = true;
    message.style.display = 'block';
    message.textContent = 'Oyun Bitti! Yeniden başlamak için Space\'e bas!';
    soundGameOver.play();
  }

  function resetGame() {
    obstacles.forEach(obstacle => obstacle.remove());
    obstacles = [];
    score = 0;
    scoreDisplay.textContent = score;
    message.style.display = 'none';
    gameOver = false;
    player.style.bottom = '50px';
    jumpHeight = 0;
    isJumping = false;
    gameSpeed = 6;
    movePupils('center');
    doorPresent = false;
    doorElement = null;
    isInDoor = false;
    isFlipped = false;
    document.body.style.transform = 'rotate(0deg)';
    gameLoop();
  }

  gameLoop();
</script>
</body>
</html>
